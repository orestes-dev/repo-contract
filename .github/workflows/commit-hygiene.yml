# Dogfood: run this repo's own commit-hygiene gate against its own pull requests,
# using the local action (`uses: ./`) rather than the published @main reference.
name: Commit Hygiene Gate
on:
  pull_request:
    types: [opened, edited, reopened, synchronize, labeled, unlabeled]
permissions:
  pull-requests: write
  contents: read # actions/checkout via `uses: ./` needs it on private repos
# Serialize per PR but queue-and-drain rather than cancel: a skipping
# incidental-label run must never cancel an in-flight validating run (see
# templates/workflow/commit-hygiene.yml for the full rationale).
concurrency:
  group: commit-hygiene-${{ github.event.pull_request.number }}
  cancel-in-progress: false
jobs:
  repo-contract:
    runs-on: ubuntu-latest
    # See templates/workflow/commit-hygiene.yml: content events and pushes always
    # run; label events run only when a human touches the override or a
    # commit-hygiene:* label, so the gate never re-triggers itself but manual
    # commit-hygiene-label edits self-heal.
    if: >-
      github.event.action == 'opened' ||
      github.event.action == 'edited' ||
      github.event.action == 'reopened' ||
      github.event.action == 'synchronize' ||
      (github.event.sender.login != 'github-actions[bot]' &&
       (github.event.label.name == 'override:commit-hygiene' ||
        startsWith(github.event.label.name, 'commit-hygiene:')))
    steps:
      - uses: actions/checkout@v5
      - uses: ./
        with:
          object: commit
