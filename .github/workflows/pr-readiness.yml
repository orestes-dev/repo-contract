# Dogfood: run this repo's own PR gate against its own pull requests, using the
# local action (`uses: ./`) rather than the published @main reference.
name: PR Readiness Gate
on:
  pull_request:
    types: [opened, edited, reopened, labeled, unlabeled]
permissions:
  pull-requests: write
  contents: read # actions/checkout via `uses: ./` needs it on private repos
  # Required to read the labels of same-repo issues this PR closes
  # (closingIssuesReferences) for the linked-issue readiness check.
  issues: read
# Serialize per PR but queue-and-drain rather than cancel: a skipping
# incidental-label run must never cancel an in-flight validating run (see
# templates/workflow/pr-readiness.yml for the full rationale).
concurrency:
  group: pr-readiness-${{ github.event.pull_request.number }}
  cancel-in-progress: false
jobs:
  repo-contract:
    runs-on: ubuntu-latest
    # See templates/pr-workflow.yml: content events always run; label events run
    # only when a human touches the override or a pr-readiness:* label, so the gate
    # never re-triggers itself but manual readiness-label edits self-heal.
    if: >-
      github.event.action == 'opened' ||
      github.event.action == 'edited' ||
      github.event.action == 'reopened' ||
      (github.event.sender.login != 'github-actions[bot]' &&
       (github.event.label.name == 'override:pr-readiness' ||
        startsWith(github.event.label.name, 'pr-readiness:')))
    steps:
      - uses: actions/checkout@v5
      - uses: ./
        with:
          object: pr
