# PR readiness gate: thin consuming workflow.
#
# It calls the shared reusable Action with `object: pr`, pinned to @main so
# rule/schema changes propagate on the next run with no per-repo bump. Unlike
# the issue gate this one hard-fails: a failing check blocks merge.
name: PR Readiness Gate
on:
  pull_request:
    types: [opened, edited, reopened, labeled, unlabeled]
permissions:
  pull-requests: write
  contents: read
  # Required to read the labels of same-repo issues this PR closes
  # (closingIssuesReferences) for the linked-issue readiness check.
  issues: read
# Serialize per PR so rapid edits do not race on labels or the comment. Runs
# queue and drain in order rather than cancelling: an incidental (non-gate) label
# event, whose job `if:` is false and which therefore skips, must never cancel an
# in-flight run that would write a verdict. run() is idempotent (it updates the
# single checklist comment and re-sets the label), so serial redundant runs
# converge on the last-writer state without double-posting or corruption.
concurrency:
  group: pr-readiness-${{ github.event.pull_request.number }}
  cancel-in-progress: false
jobs:
  repo-contract:
    runs-on: ubuntu-latest
    # Content edits (opened/edited/reopened) always re-run the gate. Label events
    # re-run it only when a HUMAN touches a gate-relevant label: the override
    # toggle, or a pr-readiness:* label hand-edited (so a manual removal self-heals).
    # The gate writes its own labels with GITHUB_TOKEN, and GitHub suppresses
    # those events from triggering runs; the sender check is defense-in-depth for
    # consumers who wire in a PAT or App token. run() is diff-based, so any
    # redundant trigger is a no-op.
    if: >-
      github.event.action == 'opened' ||
      github.event.action == 'edited' ||
      github.event.action == 'reopened' ||
      (github.event.sender.login != 'github-actions[bot]' &&
       (github.event.label.name == 'override:pr-readiness' ||
        startsWith(github.event.label.name, 'pr-readiness:')))
    steps:
      - uses: orestes-dev/repo-contract@main
        with:
          object: pr
